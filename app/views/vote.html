<section class="headline-section">
    <p class="kicker" id="vote-kicker">Convocatoria Oficial</p>
    <h1>Empleado <span class="line2" id="vote-status">del mes</span></h1>
    <p class="subhead">Selecciona al candidato de tu preferencia. Tu voto es confidencial y solo puedes emitirlo una vez.</p>
</section>

<div id="employees-container">
    <div class="loading">
        <div class="spinner"></div>
        Cargando candidatos...
    </div>
</div>

<div class="vote-action" style="text-align: center; padding: 2rem 0; border-top: 3px double var(--border);">
    <div id="selected-preview" style="font-size: 0.8rem; color: var(--muted); margin-bottom: 1.2rem; min-height: 1.2em; letter-spacing: 0.05em;">Ningún candidato seleccionado</div>
    <button class="btn-vote" id="btn-vote" disabled>
        <span>✦ Emitir Voto</span>
    </button>
    <a href="#results" class="results-link" style="display: block; margin-top: 1.5rem; font-size: 0.75rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none;">Ver resultados actuales →</a>
</div>
